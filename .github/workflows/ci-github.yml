name: builds on Linux

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ develop ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  #workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
            
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: update package index
        run: sudo apt update

      - name: Install accendino
        run: python3 -m pip install accendino

      - name: Build RDP mocks
        run: accendino --prefix=/tmp/rdpmocks --targets=rdp-mocks --debug rdp-mocks.accendino

      - name: Run unitary test
        run: meson test -C work/build/Ubuntu-Gcc-x86_64-release/rdp-mocks

